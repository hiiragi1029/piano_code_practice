<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ピアノコード練習</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #111;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  select, input {
    font-size: 16px;
    padding: 8px 10px;
    margin: 4px;
    border-radius: 8px;
    border: none;
  }

  #chord {
    font-size: 76px;
    font-weight: bold;
    margin: 24px;
  }

  #timer {
    font-size: 22px;
    color: #ccc;
  }

  #notes {
    font-size: 24px;
    margin: 12px;
  }

  #cards {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }

  .note-card {
    background: #f1c40f;
    color: #111;
    width: 82px;
    height: 96px;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .degree {
    font-size: 14px;
    color: #444;
    margin-bottom: 6px;
  }

  .note-name {
    font-size: 32px;
  }

  .hidden {
    display: none;
  }

  .small {
    color: #aaa;
    font-size: 14px;
    margin-top: 10px;
  }
</style>
</head>

<body>

  <div>
    <select id="range">
      <option value="seventh">7th系</option>
      <option value="other">それ以外</option>
    </select>

    制限時間：
    <input id="limitSeconds" type="number" value="5" min="1" max="60" style="width:60px;">
    秒

    答え表示：
    <input id="answerSeconds" type="number" value="3" min="1" max="10" style="width:60px;">
    秒
  </div>

  <div id="timer">残り: 5秒</div>
  <div id="chord">Tap</div>

  <div id="answerArea" class="hidden">
    <div id="notes"></div>
    <div id="cards"></div>
  </div>

  <div class="small">画面タップ、または時間切れで答え表示 → もう一度タップで次の問題</div>

<script>
const roots = [
  "C", "C#", "Db",
  "D", "D#", "Eb",
  "E",
  "F", "F#", "Gb",
  "G", "G#", "Ab",
  "A", "A#", "Bb",
  "B"
];

const seventhTypes = ["7", "m7", "maj7"];
const otherTypes = ["sus4", "dim", "aug", "6", "m6", "add9", "9"];

const noteNumbers = {
  "C": 0, "C#": 1, "Db": 1,
  "D": 2, "D#": 3, "Eb": 3,
  "E": 4,
  "F": 5, "F#": 6, "Gb": 6,
  "G": 7, "G#": 8, "Ab": 8,
  "A": 9, "A#": 10, "Bb": 10,
  "B": 11
};

const numberToNote = [
  "C", "C#", "D", "Eb", "E", "F",
  "F#", "G", "Ab", "A", "Bb", "B"
];

const chordIntervals = {
  "7": [0, 4, 7, 10],
  "m7": [0, 3, 7, 10],
  "maj7": [0, 4, 7, 11],

  "sus4": [0, 5, 7],
  "dim": [0, 3, 6],
  "aug": [0, 4, 8],
  "6": [0, 4, 7, 9],
  "m6": [0, 3, 7, 9],
  "add9": [0, 4, 7, 14],
  "9": [0, 4, 7, 10, 14]
};

const intervalLabels = {
  0: "Root",
  3: "m3",
  4: "3",
  5: "sus4",
  6: "♭5",
  7: "5",
  8: "♯5",
  9: "6",
  10: "♭7",
  11: "7",
  14: "9"
};

const orderPriority = {
  0: 0,
  3: 1,
  4: 1,
  5: 1,
  6: 2,
  7: 2,
  8: 2,
  9: 3,
  10: 3,
  11: 3,
  14: 4
};

let currentChord = null;
let timerId = null;
let answerTimerId = null;
let remaining = 5;
let showingAnswer = false;

const chordEl = document.getElementById("chord");
const timerEl = document.getElementById("timer");
const rangeEl = document.getElementById("range");
const limitEl = document.getElementById("limitSeconds");
const answerEl = document.getElementById("answerSeconds");
const answerArea = document.getElementById("answerArea");
const notesEl = document.getElementById("notes");
const cardsEl = document.getElementById("cards");

function makeRandomChord() {
  const root = roots[Math.floor(Math.random() * roots.length)];
  const types = rangeEl.value === "seventh" ? seventhTypes : otherTypes;
  const type = types[Math.floor(Math.random() * types.length)];

  return {
    name: root + type,
    root,
    type
  };
}

function getChordNotes(chord) {
  const rootNumber = noteNumbers[chord.root];
  const intervals = chordIntervals[chord.type];

  return intervals
    .map(interval => {
      const noteNumber = (rootNumber + interval) % 12;

      return {
        name: numberToNote[noteNumber],
        interval: interval,
        label: intervalLabels[interval] || ""
      };
    })
    .sort((a, b) => {
      return (orderPriority[a.interval] ?? 99) - (orderPriority[b.interval] ?? 99);
    });
}

function nextQuestion() {
  clearTimers();

  showingAnswer = false;
  answerArea.classList.add("hidden");

  currentChord = makeRandomChord();
  chordEl.textContent = currentChord.name;

  remaining = Number(limitEl.value) || 5;
  timerEl.textContent = `残り: ${remaining}秒`;

  timerId = setInterval(() => {
    remaining--;
    timerEl.textContent = `残り: ${remaining}秒`;

    if (remaining <= 0) {
      showAnswerThenNext();
    }
  }, 1000);
}

function showAnswerThenNext() {
  if (showingAnswer) {
    nextQuestion();
    return;
  }

  showingAnswer = true;
  clearInterval(timerId);

  const notes = getChordNotes(currentChord);

  timerEl.textContent = "答え表示中";
  notesEl.textContent = `構成音：${notes.map(n => n.name).join(" - ")}`;
  drawCards(notes);

  answerArea.classList.remove("hidden");

  const answerSeconds = Number(answerEl.value) || 3;

  answerTimerId = setTimeout(() => {
    nextQuestion();
  }, answerSeconds * 1000);
}

function drawCards(notes) {
  cardsEl.innerHTML = "";

  notes.forEach(note => {
    const card = document.createElement("div");
    card.className = "note-card";

    const degree = document.createElement("div");
    degree.className = "degree";
    degree.textContent = note.label;

    const name = document.createElement("div");
    name.className = "note-name";
    name.textContent = note.name;

    card.appendChild(degree);
    card.appendChild(name);
    cardsEl.appendChild(card);
  });
}

function clearTimers() {
  clearInterval(timerId);
  clearTimeout(answerTimerId);
}

document.body.addEventListener("click", () => {
  showAnswerThenNext();
});

rangeEl.addEventListener("change", nextQuestion);
limitEl.addEventListener("change", nextQuestion);
answerEl.addEventListener("change", nextQuestion);

nextQuestion();
</script>

</body>
</html>
